version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tabib
      POSTGRES_PASSWORD: tabib
      POSTGRES_DB: tabibverify
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://tabib:tabib@postgres:5432/tabibverify
      REDIS_URL: redis://redis:6379
      D7_API_KEY: ${D7_API_KEY}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-dev_webhook_secret_32chars_long!}
      API_KEY_SALT: ${API_KEY_SALT:-dev_api_key_salt_here_change_me}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NODE_ENV: production
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
