# render.yaml — TabibVerify DZ
# Deploys the full stack to Render.com (free tier)

databases:
  - name: tabibverify-db
    databaseName: tabibverify
    user: tabib
    plan: free           # Free tier: 256 MB RAM, 1 GB storage
    region: frankfurt    # Closest to Algeria

services:
  - type: web
    name: tabibverify
    env: node
    plan: free           # Free tier: 512 MB RAM
    region: frankfurt
    # --include=dev is required: tailwindcss/postcss are devDependencies
    # but needed at build time for Next.js CSS compilation
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /

    envVars:
      # ── Database ──────────────────────────────────────────────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: tabibverify-db
          property: connectionString

      # ── Redis (Upstash — optional, in-memory fallback if blank) ───────────
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false

      # ── Email OTP — Resend (primary, 3000 emails/month free) ─────────────
      - key: RESEND_API_KEY
        sync: false       # paste re_ftYhdREp... from resend.com

      # ── Email OTP — Gmail SMTP (fallback if Resend key not set) ──────────
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_USER
        sync: false       # your Gmail address e.g. tabibverify@gmail.com
      - key: SMTP_PASS
        sync: false       # Gmail App Password (not your login password)

      # ── AI Services ───────────────────────────────────────────────────────
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false

      # ── Security ──────────────────────────────────────────────────────────
      - key: WEBHOOK_SECRET
        generateValue: true

      - key: API_KEY_SALT
        generateValue: true

      - key: ADMIN_SECRET
        sync: false

      - key: CRON_SECRET
        generateValue: true

      # ── App ───────────────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production

      - key: NEXT_PUBLIC_APP_URL
        sync: false       # set to https://tabibverify.onrender.com after first deploy
