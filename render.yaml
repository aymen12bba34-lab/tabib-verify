services:
  - type: web
    name: tabib-verify
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      # Database
      - key: DATABASE_URL
        sync: false
      
      # SMTP Configuration (Nodemailer)
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

      # AI Services
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false

      # App Configuration
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_APP_URL
        sync: false
